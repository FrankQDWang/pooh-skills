interface:
  display_name: "LLM API Freshness Guard"
  short_description: "先抽取 Python / TS LLM surface 证据，再由 agent 归因并用 Context7 做 freshness 验证"
  default_prompt: "Use $llm-api-freshness-guard to audit Python / TypeScript code, a repository, a diff, or a file for stale LLM API usage. First run the local triage workflow to produce `.repo-harness/llm-api-surface-evidence.json`, then resolve the actual provider / family / wrapper surface per candidate, then use Context7 to verify the current docs for each resolved surface. Keep `provider-resolved`, `family-resolved`, `wrapper-resolved`, and `ambiguous` separate. Do not guess a concrete provider from weak clues. Finalize the official summary, report, and agent brief with the verified-flow helper so the output conforms to the machine contract. Keep the deliverable report-only."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Context7 MCP for live, version-specific SDK and platform documentation"
      transport: "streamable_http"
      url: "https://mcp.context7.com/mcp"
